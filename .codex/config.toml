# movie-finder-mcp-qdrant — Codex project configuration

approval_policy = "on-request"
model_reasoning_effort = "high"

[features]
multi_agent = true

[mcp_servers.github]
command = "/bin/sh"
args = ["-c", "GITHUB_PERSONAL_ACCESS_TOKEN=$(gh auth token) npx -y @modelcontextprotocol/server-github"]

[mcp_servers.jenkins-local]
command = "npx"
args = ["-y", "@kud/mcp-jenkins@latest"]
env_vars = ["MCP_JENKINS_URL", "MCP_JENKINS_USER", "MCP_JENKINS_API_TOKEN"]
